<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>MIDI ドレミビューア | シーク再生＋テンポ調整</title>
    <!-- Google Material Symbols & Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8fafd;
            font-family: 'Google Sans', 'Segoe UI', 'Noto Sans JP', system-ui, sans-serif;

        .container { max-width: 1400px; margin: 0 auto; }
        .app-header {
            display: flex;
            align-items: baseline;

        .title-section h1 {

        .upload-area {
            background: #ffffff;

        .upload-area.drag-over { border-color: #10b981; background: #f0fdf4; }

        .upload-text { font-size: 1rem; font-weight: 500; margin: 12px 0 6px; }
        .file-hint { font-size: 0.75rem; color: #6c7a91; }
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            font-family: 'Google Sans', sans-serif;
            background: transparent;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;

            gap: 8px;

        .btn-primary { background: #eef2ff; color: #1e40af; }
        .btn-primary:hover { background: #e0e7ff; }
        .btn-outline { border: 1px solid #cbd5e1; }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-accent { background: #1e40af; color: white; }
        .btn-accent:hover { background: #1e3a8a; transform: translateY(-1px); }
        .btn-stop { background: #f1f5f9; color: #b91c1c; border: 1px solid #fecaca; }
        .btn-stop:hover { background: #fee2e2; }
        .mode-toggle {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
        }
        .mode-btn {
            padding: 6px 16px;
            border-radius: 32px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: none;
        }
        .mode-btn.active {
            background: #1e40af;
            color: white;
        }
        .tempo-control {
            background: white;
            border-radius: 40px;
            padding: 4px 16px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .tempo-control input {
            width: 140px;
        }
        .stats-card {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 14px 24px;
            margin-bottom: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .stat-item { display: flex; align-items: center; gap: 8px; background: white; padding: 6px 16px; border-radius: 40px; }
        .score-container {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            overflow-x: auto;
            overflow-y: auto;
            max-height: 55vh;
            scroll-behavior: smooth;
        }
        .doremi-view { font-family: 'Roboto Mono', monospace; padding: 20px 24px; }
        .measure-block { margin-bottom: 28px; border-left: 4px solid #facc15; background: #fefce8; border-radius: 0 20px 20px 0; }
        .measure-header { display: inline-flex; align-items: center; gap: 6px; background: #facc15; padding: 4px 18px 4px 16px; border-radius: 0 24px 24px 0; font-weight: 600; font-size: 0.75rem; color: #1e293b; }
        .event-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            padding: 10px 16px;
            border-bottom: 1px solid #f0f2f5;
            background: #ffffff;
            transition: background 0.1s, box-shadow 0.1s;
        }
        .event-row.seek-mode {
            cursor: pointer;
        }
        .event-row.seek-mode:hover {
            background: #eef2ff;
        }
        .event-row.active-row {
            background: #fef3c7;
            box-shadow: 0 0 0 2px #f59e0b;

        .time-label {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 32px;
            color: #1e40af;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }
        .chord-group { display: flex; flex-wrap: wrap; gap: 10px; pointer-events: none; }
        .note-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;

            background: #fbbf24;
            border-color: #f59e0b;

        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 #fbbf24; background: #fde68a; }

        .channel-badge { font-size: 0.6rem; font-weight: 600; background: #f1f5f9; padding: 2px 8px; border-radius: 30px; color: #334155; }
        .note-pitch { font-weight: 700; font-size: 1rem; }
        .pitch-low { color: #b91c1c; }
        .pitch-mid { color: #b45309; }
        .pitch-high { color: #2563eb; }
        .pitch-veryhigh { color: #7c3aed; }
        .pitch-bar { font-size: 0.6rem; color: #94a3b8; }
        .legend { margin-top: 20px; background: #f8fafc; border-radius: 20px; padding: 12px 20px; font-size: 0.7rem; display: flex; flex-wrap: wrap; gap: 18px; }
        .empty-message { text-align: center; padding: 56px 24px; color: #5b6e8c; }
        footer { margin-top: 32px; text-align: center; font-size: 0.7rem; color: #7e8aa2; }
        .fab-scroll {
            position: fixed;
            bottom: 28px;
            left: 28px;
            z-index: 1000;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 56px;
            padding: 12px 24px;
            font-family: 'Google Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .fab-scroll:hover { background: #1e3a8a; transform: scale(1.02); }

        @media (max-width: 700px) {
            .fab-scroll { padding: 8px 18px; font-size: 0.75rem; bottom: 16px; left: 16px; }
            .tempo-control input { width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <div class="title-section">
            <h1><span class="material-symbols-outlined">piano</span> MIDI ドレミビューア</h1>
            <div class="subhead">シーク再生・テンポ調整・自動スクロール</div>
        </div>
        <div class="badge">🎵 ドレミ＋オクターブ | ⚡ 拍クリックでシーク</div>
    </div>

    <div class="upload-area" id="uploadArea">
        <div class="upload-icon"><span class="material-symbols-outlined">upload_file</span></div>
        <div class="upload-text">MIDIファイルを開く</div>
        <div class="file-hint">クリック または ドラッグ＆ドロップ (.mid / .midi)</div>
        <input type="file" id="fileInput" accept=".mid,.midi" style="display: none;">
    </div>

    <div id="controlsWrapper" style="display: none;">
        <div class="controls-bar">
            <div class="btn-group">
                <button id="playBtn" class="btn btn-accent"><span class="material-symbols-outlined">play_arrow</span> 再生</button>
                <button id="stopBtn" class="btn btn-stop"><span class="material-symbols-outlined">stop</span> 停止</button>
            </div>
            <div class="btn-group">
                <div class="mode-toggle" id="modeToggle">
                    <button class="mode-btn active" data-mode="normal">🎼 通常</button>
                    <button class="mode-btn" data-mode="seek">🔍 シークモード</button>
                </div>
                <div class="tempo-control">
                    <span class="material-symbols-outlined" style="font-size: 18px;">speed</span>
                    <input type="range" id="tempoSlider" min="60" max="240" value="120" step="1">
                    <span id="tempoValue" style="min-width: 45px;">120 BPM</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="exportTxtBtn" class="btn btn-primary"><span class="material-symbols-outlined">description</span> テキスト出力</button>
                <button id="clearBtn" class="btn btn-outline"><span class="material-symbols-outlined">clear</span> クリア</button>
            </div>
        </div>
    </div>

    <div id="statsPanel" style="display: none;"></div>

    <div class="score-container" id="scoreContainer">
        <div id="resultArea" class="doremi-view">
            <div class="empty-message">
                <span class="material-symbols-outlined" style="font-size: 48px;">library_music</span>
                <p>📂 MIDIファイルを読み込むと表示されます<br>🔍 シークモードで拍目をクリック → その位置から再生</p>
            </div>
        </div>
    </div>
    <footer>⚡ シークモード時：拍目表示部分をクリックでその場から再生 | テンポスライダーで速度変更</footer>
</div>

<button id="autoScrollBtn" class="fab-scroll">
    <span class="material-symbols-outlined">center_focus_strong</span> 自動フォーカス開始
</button>

<script>
    // --------------------------------------------------------------
    // MIDIパーサ
    // --------------------------------------------------------------
    class MidiParser {
        static parse(arrayBuffer) {
            const data = new Uint8Array(arrayBuffer);
            let pos = 0;
            if (this.readString(data, pos, 4) !== 'MThd') throw new Error('Invalid MIDI');
            pos += 8;
            const format = this.readInt16(data, pos); pos += 2;
            const numTracks = this.readInt16(data, pos); pos += 2;
            const division = this.readInt16(data, pos); pos += 2;
            const ticksPerQuarter = division & 0x7FFF;
            const tracks = [];
            for (let t = 0; t < numTracks; t++) {
                if (this.readString(data, pos, 4) !== 'MTrk') throw new Error('Invalid track');
                pos += 4;
                const trackLen = this.readInt32(data, pos); pos += 4;
                const trackData = data.slice(pos, pos + trackLen); pos += trackLen;
                tracks.push({ index: t, events: this.parseTrack(trackData) });
            }
            return { format, numTracks, ticksPerQuarter, tracks };
        }
        static parseTrack(data) {
            const events = [];
            let pos = 0, absTime = 0, lastStatus = 0;
            while (pos < data.length) {
                const delta = this.readVarInt(data, pos); pos = delta.newPos;
                absTime += delta.value;
                let status = data[pos]; pos++;
                if (status < 0x80) { pos--; status = lastStatus; }
                lastStatus = status;
                const type = status >> 4;
                const channel = status & 0x0F;
                if (type === 0x8) { const note = data[pos]; pos += 2; events.push({ type: 'note_off', channel, note, time: absTime }); }
                else if (type === 0x9) { const note = data[pos], vel = data[pos+1]; pos += 2; if (vel > 0) events.push({ type: 'note_on', channel, note, velocity: vel, time: absTime }); else events.push({ type: 'note_off', channel, note, time: absTime }); }
                else if (type === 0xA || type === 0xB || type === 0xE) pos += 2;
                else if (type === 0xC || type === 0xD) pos += 1;
                else if (status === 0xFF) { pos++; const len = this.readVarInt(data, pos); pos = len.newPos; pos += len.value; }
                else if (status === 0xF0 || status === 0xF7) { const len = this.readVarInt(data, pos); pos = len.newPos; pos += len.value; }
            }
            return events;
        }
        static readString(d, p, l) { return String.fromCharCode(...d.slice(p, p+l)); }
        static readInt32(d, p) { return (d[p]<<24)|(d[p+1]<<16)|(d[p+2]<<8)|d[p+3]; }
        static readInt16(d, p) { return (d[p]<<8)|d[p+1]; }
        static readVarInt(d, p) { let v=0, b; do { b=d[p]; v=(v<<7)|(b&0x7F); p++; } while(b&0x80); return { value:v, newPos:p }; }
    }

    function midiNoteToFullName(n) { const names=['ド','ド♯','レ','レ♯','ミ','ファ','ファ♯','ソ','ソ♯','ラ','ラ♯','シ']; return `${names[n%12]}${Math.floor(n/12)-1}`; }
    function getPitchColorClass(n) { if (n<48) return 'pitch-low'; if (n<64) return 'pitch-mid'; if (n<80) return 'pitch-high'; return 'pitch-veryhigh'; }
    function pitchLevelBar(n) { let l = Math.min(5, Math.max(0, Math.floor((n-24)/12))); return '●'.repeat(l+1)+'○'.repeat(5-l); }

    function processMIDIToGroups(midi) {
        const allNotes = [];
        for (const track of midi.tracks) for (const ev of track.events) if (ev.type === 'note_on' && ev.velocity > 0) allNotes.push({ time: ev.time, note: ev.note, channel: ev.channel });
        allNotes.sort((a,b)=>a.time-b.time);
        const groups = []; let cur=[], curT=-1;
        for (const ev of allNotes) { if (ev.time !== curT && cur.length) { groups.push({ time: curT, notes: [...cur] }); cur=[]; } cur.push(ev); curT=ev.time; }
        if (cur.length) groups.push({ time: curT, notes: cur });
        return { groups, ticksPerQuarter: midi.ticksPerQuarter };
    }

    function renderScoreWithData(processed, seekMode) {
        const { groups, ticksPerQuarter } = processed;
        if (!groups.length) return '<div class="empty-message">音符がありません</div>';
        const ticksPerBar = ticksPerQuarter * 4;
        let html = '', currentBar = -1;
        for (let idx=0; idx<groups.length; idx++) {
            const g = groups[idx];
            const bar = Math.floor(g.time / ticksPerBar) + 1;
            if (bar !== currentBar) { if (currentBar !== -1) html += `</div>`; html += `<div class="measure-block"><div class="measure-header">📖 小節 ${bar}</div>`; currentBar = bar; }
            const beatRaw = g.time / ticksPerQuarter;
            const beatInMeasure = (beatRaw % 4).toFixed(1);
            const displayBeat = beatInMeasure === '0.0' ? '1.0' : (parseFloat(beatInMeasure) + 1).toFixed(1);
            const seekClass = seekMode ? 'seek-mode' : '';
            html += `<div class="event-row ${seekClass}" data-group-index="${idx}" data-group-time="${g.time}">`;
            html += `<div class="time-label"><span class="material-symbols-outlined" style="font-size:14px">schedule</span> ${displayBeat}拍目</div>`;
            html += `<div class="chord-group">`;
            for (const n of [...g.notes].sort((a,b)=>a.note-b.note)) {
                html += `<div class="note-chip"><span class="channel-badge">${n.channel===0?'🎹右':'🎸左'}</span><span class="note-pitch ${getPitchColorClass(n.note)}">${midiNoteToFullName(n.note)}</span><span class="pitch-bar">${pitchLevelBar(n.note)}</span></div>`;
            }
            html += `</div></div>`;
        }
        if (currentBar !== -1) html += `</div>`;
        html += `<div class="legend">🎨 色=音高 | 🔍 シークモード時、拍目をクリックでその位置から再生 | 🎚️ テンポ調整可能</div>`;
        return html;
    }

    // --------------------------------------------------------------
    // 再生エンジン
    // --------------------------------------------------------------
    let audioCtx = null;
    let activeOscillators = [];
    let playbackTimeout = null;
    let highlightTimer = null;
    let isPlaying = false;
    let currentGroupIndex = -1;
    let currentGroups = [];
    let currentTicksPerQuarter = 480;
    let currentTempoBPM = 120;
    
    let seekModeActive = false;
    let autoScrollEnabled = true;
    let userScrolled = false;

    const scoreContainer = document.getElementById('scoreContainer');
    const autoScrollBtn = document.getElementById('autoScrollBtn');
    const tempoSlider = document.getElementById('tempoSlider');
    const tempoValue = document.getElementById('tempoValue');

    tempoSlider.addEventListener('input', (e) => { currentTempoBPM = parseInt(e.target.value); tempoValue.textContent = `${currentTempoBPM} BPM`; });

    function setSeekMode(active) {
        seekModeActive = active;
        const rows = document.querySelectorAll('.event-row');
        rows.forEach(row => {
            if (active) row.classList.add('seek-mode');
            else row.classList.remove('seek-mode');
        });
        if (active) attachSeekEvents();
    }

    function attachSeekEvents() {
        const rows = document.querySelectorAll('.event-row.seek-mode');
        rows.forEach(row => {
            if (row._seekHandler) row.removeEventListener('click', row._seekHandler);
            const handler = async (e) => {
                e.stopPropagation();
                const idx = parseInt(row.dataset.groupIndex);
                if (!isNaN(idx) && currentGroups.length) {
                    await startPlaybackFromGroup(idx);
                }
            };
            row._seekHandler = handler;
            row.addEventListener('click', handler);
        });
    }

    async function getAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') await audioCtx.resume(); return audioCtx; }
    function midiToFreq(note) { return 440 * Math.pow(2, (note - 69) / 12); }
    function playNoteAtTime(ctx, freq, startTime, durationSec, vel=0.85) {
        const when = Math.max(ctx.currentTime, startTime);
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.value = vel * 0.7;
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(when);
        gain.gain.setValueAtTime(vel*0.7, when);
        gain.gain.exponentialRampToValueAtTime(0.0001, when+durationSec);
        osc.stop(when+durationSec);
        const handle = { osc, gain };
        osc.onended = () => { const idx = activeOscillators.indexOf(handle); if(idx!==-1) activeOscillators.splice(idx,1); };
        activeOscillators.push(handle);
        return handle;
    }

    async function stopPlayback() {
        if (playbackTimeout) clearTimeout(playbackTimeout);
        if (highlightTimer) clearTimeout(highlightTimer);
        for (const h of activeOscillators) { try { h.osc.stop(); } catch(e){} }
        activeOscillators = [];
        isPlaying = false;
        document.querySelectorAll('.event-row.active-row').forEach(r=>r.classList.remove('active-row'));
        document.querySelectorAll('.note-chip.active-note').forEach(c=>c.classList.remove('active-note'));
        currentGroupIndex = -1;
        if (audioCtx) { try { await audioCtx.close(); } catch(e){} audioCtx = null; }
    }

    async function startPlaybackFromGroup(startGroupIndex) {
        await stopPlayback();
        if (!currentGroups.length) return;
        const ctx = await getAudioContext();
        if (!ctx) return;
        const secondsPerTick = (60.0 / currentTempoBPM) / currentTicksPerQuarter;
        const startBaseTime = ctx.currentTime + 0.05;
        const firstGroupTime = currentGroups[startGroupIndex].time;
        const timeOffset = firstGroupTime * secondsPerTick;
        const globalStartTime = startBaseTime - timeOffset;
        
        const MIN_DUR = 0.22;
        const noteJobs = [];
        const groupSchedule = [];
        for (let i=startGroupIndex; i<currentGroups.length; i++) {
            const g = currentGroups[i];
            const absSec = g.time * secondsPerTick;
            const playTime = globalStartTime + absSec;
            let dur = MIN_DUR;
            if (i+1 < currentGroups.length) {
                const nextSec = currentGroups[i+1].time * secondsPerTick;
                const gap = nextSec - absSec;
                dur = Math.max(MIN_DUR, Math.min(gap, 0.7));
            } else dur = 0.45;
            groupSchedule.push({ idx: i, playTime, dur });
            for (const n of g.notes) noteJobs.push({ freq: midiToFreq(n.note), playTime, duration: dur });
        }
        for (const job of noteJobs) playNoteAtTime(ctx, job.freq, job.playTime, job.duration, 0.85);
        
        let scheduleIdx = 0;
        const scheduleHighlight = () => {
            if (!isPlaying) return;
            const now = ctx.currentTime;
            while (scheduleIdx < groupSchedule.length && groupSchedule[scheduleIdx].playTime <= now + 0.05) {
                if (currentGroupIndex !== groupSchedule[scheduleIdx].idx) {
                    currentGroupIndex = groupSchedule[scheduleIdx].idx;
                    highlightGroup(currentGroupIndex);
                    if (autoScrollEnabled && !userScrolled) scrollToActiveRow();
                }
                scheduleIdx++;
            }
            if (scheduleIdx < groupSchedule.length) {
                const nextTime = groupSchedule[scheduleIdx].playTime;
                const delay = Math.max(0, (nextTime - ctx.currentTime) * 1000);
                highlightTimer = setTimeout(scheduleHighlight, delay);
            } else { currentGroupIndex = -1; highlightGroup(-1); }
        };
        isPlaying = true;
        scheduleHighlight();
        const last = groupSchedule[groupSchedule.length-1];
        const endTime = last.playTime + last.dur;
        playbackTimeout = setTimeout(async () => { if(isPlaying) await stopPlayback(); }, (endTime - ctx.currentTime)*1000 + 300);
    }

    function highlightGroup(idx) {
        document.querySelectorAll('.event-row.active-row').forEach(r=>r.classList.remove('active-row'));
        document.querySelectorAll('.note-chip.active-note').forEach(c=>c.classList.remove('active-note'));
        if (idx<0) return;
        const row = document.querySelector(`.event-row[data-group-index="${idx}"]`);
        if (row) {
            row.classList.add('active-row');
            row.querySelectorAll('.note-chip').forEach(chip => { chip.classList.add('active-note'); setTimeout(()=>chip.classList.remove('active-note'), 300); });
        }
    }
    function scrollToActiveRow() {
        if (!autoScrollEnabled) return;
        const active = document.querySelector(`.event-row.active-row`);
        if (active && scoreContainer) active.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    function disableAutoScroll() { autoScrollEnabled = false; userScrolled = true; autoScrollBtn.classList.add('disabled'); autoScrollBtn.innerHTML='<span class="material-symbols-outlined">center_focus_weak</span> 手動停止中'; setTimeout(()=>{ if(!autoScrollEnabled){ autoScrollBtn.innerHTML='<span class="material-symbols-outlined">center_focus_strong</span> 自動フォーカス開始'; autoScrollBtn.classList.remove('disabled'); } },1500); }
    function enableAutoScroll() { autoScrollEnabled=true; userScrolled=false; autoScrollBtn.classList.remove('disabled'); autoScrollBtn.innerHTML='<span class="material-symbols-outlined">center_focus_strong</span> 自動フォーカス開始'; if(isPlaying && currentGroupIndex>=0) scrollToActiveRow(); }

    // --------------------------------------------------------------
    // UI 操作
    // --------------------------------------------------------------
    let currentProcessed = null;
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const resultArea = document.getElementById('resultArea');
    const controlsWrapper = document.getElementById('controlsWrapper');
    const statsPanelDiv = document.getElementById('statsPanel');
    const playBtn = document.getElementById('playBtn');
    const stopBtn = document.getElementById('stopBtn');
    const exportBtn = document.getElementById('exportTxtBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modeToggle = document.getElementById('modeToggle');

    // ファイル選択 - 直接クリックで動作するよう修正
    uploadArea.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
    });
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', async e => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && (file.name.endsWith('.mid') || file.name.endsWith('.midi'))) await loadAndRender(file);
        else resultArea.innerHTML = `<div class="empty-message">⚠️ .mid ファイルをドロップしてください</div>`;
    });
    fileInput.addEventListener('change', async e => { if (e.target.files[0]) await loadAndRender(e.target.files[0]); });

    modeToggle.addEventListener('click', (e) => {
        const btn = e.target.closest('.mode-btn');
        if (!btn) return;
        const mode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        seekModeActive = (mode === 'seek');
        if (currentProcessed) {
            resultArea.innerHTML = renderScoreWithData(currentProcessed, seekModeActive);
            if (seekModeActive) attachSeekEvents();
        } else {
            setSeekMode(seekModeActive);
        }
    });

    async function loadAndRender(file) {
        await stopPlayback();
        resultArea.innerHTML = '<div class="empty-message">解析中...</div>';
        try {
            const buf = await file.arrayBuffer();
            const midi = MidiParser.parse(buf);
            const processed = processMIDIToGroups(midi);
            currentProcessed = processed;
            currentGroups = processed.groups;
            currentTicksPerQuarter = processed.ticksPerQuarter;
            const totalNotes = processed.groups.reduce((s,g)=>s+g.notes.length,0);
            statsPanelDiv.style.display = 'block';
            statsPanelDiv.innerHTML = `<div class="stats-card"><div class="stat-item">📄 ${escapeHtml(file.name)}</div><div class="stat-item">🎵 総ノート ${totalNotes}</div><div class="stat-item">🎼 和音数 ${processed.groups.length}</div><div class="stat-item">🎚️ テンポ可変</div></div>`;
            resultArea.innerHTML = renderScoreWithData(processed, seekModeActive);
            controlsWrapper.style.display = 'block';
            if (seekModeActive) attachSeekEvents();
            autoScrollEnabled = true; userScrolled = false;
            autoScrollBtn.classList.remove('disabled'); autoScrollBtn.innerHTML='<span class="material-symbols-outlined">center_focus_strong</span> 自動フォーカス開始';
        } catch(err) { resultArea.innerHTML = `<div class="empty-message">❌ ${escapeHtml(err.message)}</div>`; controlsWrapper.style.display = 'none'; statsPanelDiv.style.display = 'none'; }
    }

    playBtn.addEventListener('click', async () => {
        if (!currentProcessed) { alert("MIDIを読み込んでください"); return; }
        await startPlaybackFromGroup(0);
    });
    stopBtn.addEventListener('click', async () => { await stopPlayback(); });
    exportBtn.addEventListener('click', () => {
        if (!currentProcessed) return;
        const lines = []; let bar=-1, ticksPerBar=currentTicksPerQuarter*4;
        for(let i=0;i<currentGroups.length;i++){ const g=currentGroups[i]; const b=Math.floor(g.time/ticksPerBar)+1; if(b!==bar){ if(bar!==-1) lines.push(''); lines.push(`【小節 ${b}】`); bar=b; } const beat=(g.time/currentTicksPerQuarter)%4; const disp= beat===0?'1.0':(beat+1).toFixed(1); const notes=g.notes.map(n=>`${n.channel===0?'右':'左'}${midiNoteToFullName(n.note)}`).join(','); lines.push(`  ${disp}拍目: ${notes}`); }
        const blob = new Blob([lines.join('\n')], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='midi_doremi.txt'; a.click(); URL.revokeObjectURL(a.href);
    });
    clearBtn.addEventListener('click', async () => { await stopPlayback(); currentProcessed = null; resultArea.innerHTML = `<div class="empty-message">クリアしました</div>`; controlsWrapper.style.display = 'none'; statsPanelDiv.style.display = 'none'; fileInput.value = ''; });
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    
    scoreContainer.addEventListener('wheel', () => { if (autoScrollEnabled) disableAutoScroll(); });
    scoreContainer.addEventListener('touchmove', () => { if (autoScrollEnabled) disableAutoScroll(); });
    autoScrollBtn.addEventListener('click', () => { enableAutoScroll(); if (isPlaying && currentGroupIndex>=0) scrollToActiveRow(); });
</script>
</body>
</html>
